name: Build iOS IPA

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd spotify--banda
          npm install

      - name: Sync Capacitor
        run: |
          cd spotify--banda
          npx cap sync ios

      - name: Build IPA
        run: |
          cd spotify--banda/ios/App
          xcodebuild \
            -scheme App \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          mkdir -p build/output
          cp -r build/App.xcarchive/Products/Applications/*.app build/output/
          cd build/output
          mkdir Payload
          cp -r *.app Payload/
          zip -r BengaStation.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BengaStation
          path: spotify--banda/ios/App/build/output/BengaStation.ipa