name: Build iOS IPA

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd spotify--banda
          npm install
        env:
          SUPABASE_SKIP_INSTALL_BINARY: true

      - name: Build Next.js static export
        run: |
          cd spotify--banda
          npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "$VPS_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          scp -o StrictHostKeyChecking=no -i /tmp/deploy_key -r spotify--banda/out/* root@$VPS_HOST:/var/www/benga/
          rm /tmp/deploy_key

      - name: Sync Capacitor
        run: |
          cd spotify--banda
          npx cap sync ios

      - name: Find NativeAudio files
        run: |
          find spotify--banda/ios -name "RemoteAudioAsset.swift"
          find spotify--banda/ios -name "Plugin.swift"    

      - name: Patch NativeAudio seek tolerance and lock screen controls
        run: |
          FILE=$(find spotify--banda/ios -name "RemoteAudioAsset.swift" -path "*/NativeAudioPlugin/*" | head -1)
          sed -i '' 's/toleranceBefore: .zero, toleranceAfter: .zero/toleranceBefore: .positiveInfinity, toleranceAfter: .positiveInfinity/g' "$FILE"
          
          PLUGIN=$(find spotify--banda/ios -name "Plugin.swift" -path "*/NativeAudioPlugin/*" | head -1)
          sed -i '' 's/commandCenter\.skipForwardCommand\.preferredIntervals = \[NSNumber(value: 15)\]/commandCenter.nextTrackCommand.isEnabled = true/g' "$PLUGIN"
          sed -i '' 's/commandCenter\.skipForwardCommand\.isEnabled = true/commandCenter.skipForwardCommand.isEnabled = false/g' "$PLUGIN"
          sed -i '' '/commandCenter\.skipForwardCommand\.addTarget/,/^        }/d' "$PLUGIN"
          sed -i '' 's/commandCenter\.skipBackwardCommand\.preferredIntervals = \[NSNumber(value: 15)\]/commandCenter.previousTrackCommand.isEnabled = true/g' "$PLUGIN"
          sed -i '' 's/commandCenter\.skipBackwardCommand\.isEnabled = true/commandCenter.skipBackwardCommand.isEnabled = false/g' "$PLUGIN"
          sed -i '' '/commandCenter\.skipBackwardCommand\.addTarget/,/^        }/d' "$PLUGIN"


      - name: Set App Icon
        run: |
          sips -z 1024 1024 \
            spotify--banda/public/icons/apple-touch-icon.png \
            --out spotify--banda/ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png

      - name: Build IPA
        run: |
          cd spotify--banda/ios/App
          xcodebuild \
            -scheme App \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          mkdir -p build/Payload
          cp -r build/App.xcarchive/Products/Applications/App.app build/Payload/
          ditto -c -k --sequesterRsrc --keepParent build/Payload BengaStation.ipa
          mv BengaStation.ipa build/BengaStation.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BengaStation
          path: spotify--banda/ios/App/build/BengaStation.ipa